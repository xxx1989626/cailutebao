<!-- templates/hr/document/add.html -->
{% extends "base.html" %}

{% block title %}添加证件{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom">
                <h5 class="mb-0 fw-bold text-dark">
                    <i class="bi bi-plus-lg me-2"></i>添加证件 - {{ cycle.name }}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    {% include 'hr/document/_document_form.html' %}
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-1">
                            {% if is_admin %}保存{% else %}提交审批{% endif %}
                        </button>
                        <a href="{{ url_for('hr.hr_detail', id_card=cycle.id_card) }}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
