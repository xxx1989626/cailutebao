<!-- templates/hr/document/edit.html -->
{% extends "base.html" %}

{% block title %}编辑证件{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom">
                <h5 class="mb-0 fw-bold text-dark">
                    <i class="bi bi-pencil me-2"></i>编辑证件 - {{ document.cycle.name }}
                </h5>
            </div>
            <div class="card-body">
                {% if document.pending_status == 'pending' %}
                <div class="alert alert-warning">
                    <i class="bi bi-clock me-2"></i>该证件有变更正在审批中，暂时无法编辑
                </div>
                <a href="{{ url_for('hr.hr_detail', id_card=document.cycle.id_card) }}" class="btn btn-secondary">返回</a>
                {% else %}
                <form method="POST" enctype="multipart/form-data">
                    {% include 'hr/document/_document_form.html' %}
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary flex-1">
                            {% if is_admin %}保存{% else %}提交审批{% endif %}
                        </button>
                        <a href="{{ url_for('hr.hr_detail', id_card=document.cycle.id_card) }}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
