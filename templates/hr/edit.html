<!-- templates\hr\edit.html -->
{% extends "base.html" %}

{% block title %}编辑员工信息 - {{ cycle.name }}{% endblock %}

{% block content %}
<style>
    /* 页面专属样式 */
    .form-page-card {
        border: none;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        overflow: hidden;
    }
    
    .form-page-header {
        background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%) !important;
        color: #212529 !important;
        padding: 1rem 1.5rem;
        border-bottom: none;
    }
    
    .form-page-body {
        padding: 2rem;
    }
    
    .action-btn {
        padding: 0.75rem 2rem;
        border-radius: 8px;
        font-weight: 500;
        transition: all 0.2s ease;
        margin: 0 0.5rem;
    }
    
    .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    
    @media (max-width: 768px) {
        .form-page-body {
            padding: 1rem;
        }
        
        .action-btn {
            width: 100%;
            margin: 0.5rem 0;
        }
    }
</style>

<div class="container mt-4 mb-5">
    <div class="card form-page-card">
        <div class="card-header form-page-header d-flex justify-content-between align-items-center">
            <h4 class="mb-0">
                <i class="bi bi-pencil-square me-2"></i>编辑员工信息 - {{ cycle.name }}
            </h4>
            <div>
                <a href="{{ url_for('hr.hr_detail', id_card=cycle.id_card) }}" class="btn btn-dark btn-sm me-2">
                    <i class="bi bi-eye me-1"></i>查看详情
                </a>
                <a href="{{ url_for('hr.hr_list') }}" class="btn btn-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>返回列表
                </a>
            </div>
        </div>
        <div class="card-body form-page-body">
            <form id="editForm" method="POST" action="{{ url_for('hr.edit_cycle', cycle_id=cycle.id) }}" enctype="multipart/form-data" class="needs-validation" novalidate>
                {% set employee = cycle %}
                {% include "hr/_employee_form.html" with context %}
                
                <div class="text-center mt-5 pt-4 border-top">
                    {% if cycle.status == "在职" %}
                        <button type="submit" class="btn btn-primary action-btn btn-lg">
                            <i class="bi bi-save me-2"></i>保存修改
                        </button>
                    {% else %}
                        <button type="button" id="btnSaveAndApprove" class="btn btn-success action-btn btn-lg">
                            <i class="bi bi-check-circle me-2"></i>保存并批准入职
                        </button>
                    {% endif %}
                    
                    <a href="{{ url_for('hr.hr_detail', id_card=cycle.id_card) }}" class="btn btn-secondary action-btn btn-lg ms-2">
                        <i class="bi bi-x-circle me-2"></i>取消
                    </a>
                </div>
            </form>

            <form id="approveForm" action="{{ url_for('hr.approve_pending', id=cycle.id) }}" method="POST" style="display:none;"></form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const btnApprove = document.getElementById('btnSaveAndApprove');
    const editForm = document.getElementById('editForm');
    const approveForm = document.getElementById('approveForm');

    if (btnApprove) {
        btnApprove.addEventListener('click', function() {
            if (!confirm('确定保存修改并批准 {{ cycle.name }} 入职吗？')) return;

            // 1. 禁用按钮防止重复点击
            btnApprove.disabled = true;
            btnApprove.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>处理中...';

            // 2. 使用 FormData 包装主表单数据
            const formData = new FormData(editForm);

            // 3. 先执行异步保存 (Fetch API)
            fetch(editForm.action, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                // 注意：后端保存成功后会执行 redirect，Fetch 会跟随重定向
                // 我们只需要确保保存逻辑执行完成（没报错）即可
                if (response.ok) {
                    // 4. 保存完成后，直接提交隐藏的审批表单
                    // 这会触发完整的后端 approve_pending 逻辑并执行最终跳转
                    approveForm.submit();
                } else {
                    alert('保存信息失败，请检查数据准确性');
                    location.reload();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('网络错误，请稍后再试');
                btnApprove.disabled = false;
            });
        });
    }
});

    // 表单验证
    (() => {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()

    // 确认取消提示
    document.addEventListener('DOMContentLoaded', function() {
        const cancelBtn = document.querySelector('.btn-secondary.action-btn');
        if (cancelBtn) {
            cancelBtn.addEventListener('click', function(e) {
                if (isFormModified()) {
                    if (!confirm('您有未保存的修改，确定要取消吗？')) {
                        e.preventDefault();
                    }
                }
            });
        }
        
        // 检测表单是否被修改
        function isFormModified() {
            const inputs = document.querySelectorAll('input, select, textarea');
            for (let input of inputs) {
                if (input.type === 'checkbox' || input.type === 'radio') {
                    if (input.defaultChecked !== input.checked) return true;
                } else if (input.defaultValue !== input.value) {
                    return true;
                }
            }
            return false;
        }
    });
</script>
{% endblock %}
