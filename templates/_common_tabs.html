<!-- templates/_common_tabs.html -->
<!-- 公共导航标签 HTML -->
<div class="hr-tabs mb-4">
    <a href="{{ url_for('scheduling.schedule_list') }}" class="{% if request.endpoint == 'scheduling.schedule_list' %}active{% endif %}">
        <i class="bi bi-calendar-week me-1"></i> 排班管理
    </a>
    <a href="{{ url_for('posts.posts_list') }}" class="{% if request.endpoint == 'posts.posts_list' %}active{% endif %}">
        <i class="bi bi-briefcase me-1"></i> 岗位管理
    </a>
    <a href="{{ url_for('trip.trip_list') }}" class="{% if request.endpoint == 'trip.trip_list' %}active{% endif %}">
        <i class="bi bi-airplane me-1"></i> 出差管理
    </a>
    <a href="{{ url_for('leave.leave_list') }}" class="{% if request.endpoint == 'leave.leave_list' %}active{% endif %}">
        <i class="bi bi-person-slash me-1"></i> 请假管理
    </a>
</div>

<!-- 公共标签样式（抽离核心重复样式） -->
<style>
/* 导航标签样式 - 公共 */
.hr-tabs { 
    border-bottom: 2px solid #eee; 
    display: flex; 
    gap: 20px;
    flex-wrap: wrap;
}

.hr-tabs a { 
    text-decoration: none; 
    color: #666; 
    padding: 10px 15px; 
    border-bottom: 3px solid transparent; 
    transition: all 0.3s; 
    font-weight: 500;
    border-radius: 4px 4px 0 0;
}

.hr-tabs a:hover { 
    color: #0d6efd;
    background-color: rgba(13, 110, 253, 0.05);
}

.hr-tabs a.active { 
    color: #0d6efd; 
    border-bottom-color: #0d6efd;
    background-color: rgba(13, 110, 253, 0.05);
}

/* 标签响应式适配 - 公共 */
@media (max-width: 768px) {
    .hr-tabs {
        gap: 10px;
    }
    
    .hr-tabs a {
        padding: 8px 10px;
        font-size: 0.875rem;
    }
}
</style>
